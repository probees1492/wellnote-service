<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    WellNote app icon — tear-off pad with brush-painted W'.
    The W is built from four single-segment stroked paths whose
    stroke-width steps down subtly from left to right (88 → 80 → 72 → 64)
    so the glyph reads as one continuous brush motion that thins
    slightly toward the right.
  -->
  <rect width="1024" height="1024" fill="#F4ECD7"/>

  <!-- Top tear strip (6 small triangular notches) -->
  <g fill="#0F172A">
    <polygon points="120,0  140,40  160,0"/>
    <polygon points="260,0  280,40  300,0"/>
    <polygon points="400,0  420,40  440,0"/>
    <polygon points="540,0  560,40  580,0"/>
    <polygon points="680,0  700,40  720,0"/>
    <polygon points="820,0  840,40  860,0"/>
  </g>

  <!-- Brush-W: 4 overlapping stroked segments, gentle left→right taper -->
  <g fill="none" stroke="#0F172A" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 208 296 L 380 800" stroke-width="88"/>
    <path d="M 380 800 L 512 512" stroke-width="80"/>
    <path d="M 512 512 L 644 800" stroke-width="72"/>
    <path d="M 644 800 L 816 296" stroke-width="64"/>
  </g>

  <!-- Apostrophe — small brush comma, slightly thinned tail -->
  <path d="M 866 222 L 836 364" fill="none" stroke="#0F172A"
        stroke-width="42" stroke-linecap="round"/>
</svg>
