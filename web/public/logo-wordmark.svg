<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" width="540" height="120" role="img" aria-label="We'llNote">
  <!--
    "We'llNote" wordmark.
    The apostrophe — meaning "will" — is rendered as a very narrow
    vertical mark between 'e' and 'l' so the brand reads as
    "WellNote" at a glance, "We'll Note" on closer inspection.
  -->
  <g font-family="Pretendard, 'Pretendard Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
     font-weight="800" font-size="100" letter-spacing="-3"
     fill="currentColor">
    <text x="0" y="92">We</text>
    <rect x="139" y="22" width="3" height="20" rx="1.5"/>
    <text x="145" y="92">llNote</text>
  </g>
</svg>
